<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="40%" stop-color="#12122a"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <radialGradient id="glow-blue" cx="0.75" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="0.2" cy="0.8" r="0.45">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#fff" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <rect width="1200" height="420" fill="url(#glow-blue)"/>
  <rect width="1200" height="420" fill="url(#glow-purple)"/>

  <!-- ========== LEFT: Title area ========== -->

  <!-- Main title -->
  <text x="80" y="110" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-2">Remote CLI</text>

  <!-- Subtitle -->
  <text x="80" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#8888bb" letter-spacing="0.3">把终端和 AI 编码助手装进飞书</text>

  <!-- Description -->
  <text x="80" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#5a5a7a">在飞书聊天窗口远程控制服务器、与 Claude Code / opencode 对话</text>
  <text x="80" y="214" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#5a5a7a">不需要 SSH 客户端，一个飞书就够了</text>

  <!-- Tech pills row -->
  <g transform="translate(80, 244)">
    <rect width="112" height="30" rx="15" fill="#4a9eff" fill-opacity="0.12" stroke="#4a9eff" stroke-opacity="0.25" stroke-width="1"/>
    <text x="56" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#4a9eff">Claude Code</text>

    <rect x="122" width="96" height="30" rx="15" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-opacity="0.25" stroke-width="1"/>
    <text x="170" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#a78bfa">opencode</text>

    <rect x="228" width="72" height="30" rx="15" fill="#52c41a" fill-opacity="0.12" stroke="#52c41a" stroke-opacity="0.25" stroke-width="1"/>
    <text x="264" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#52c41a">tmux</text>

    <rect x="310" width="96" height="30" rx="15" fill="#f5a623" fill-opacity="0.12" stroke="#f5a623" stroke-opacity="0.25" stroke-width="1"/>
    <text x="358" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#f5a623">飞书卡片</text>

    <rect x="416" width="96" height="30" rx="15" fill="#ff6b6b" fill-opacity="0.12" stroke="#ff6b6b" stroke-opacity="0.25" stroke-width="1"/>
    <text x="464" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#ff6b6b">WebSocket</text>
  </g>

  <!-- Stats -->
  <g transform="translate(80, 320)">
    <!-- Tests -->
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="white">213</text>
    <text x="0" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#5a5a7a">tests passed</text>

    <!-- Separator -->
    <line x1="80" y1="-10" x2="80" y2="24" stroke="#2a2a4a" stroke-width="1"/>

    <!-- AI -->
    <text x="105" y="0" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="white">2</text>
    <text x="105" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#5a5a7a">AI engines</text>

    <!-- Separator -->
    <line x1="178" y1="-10" x2="178" y2="24" stroke="#2a2a4a" stroke-width="1"/>

    <!-- Lang -->
    <text x="203" y="0" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#3178C6">TS</text>
    <text x="203" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#5a5a7a">TypeScript</text>

    <!-- Separator -->
    <line x1="262" y1="-10" x2="262" y2="24" stroke="#2a2a4a" stroke-width="1"/>

    <!-- License -->
    <text x="287" y="0" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#febc2e">MIT</text>
    <text x="287" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#5a5a7a">license</text>
  </g>

  <!-- ========== RIGHT: Phone mockup with real conversation ========== -->
  <g transform="translate(720, 18)" filter="url(#shadow)">
    <!-- Phone body -->
    <rect width="260" height="384" rx="28" fill="#141420" stroke="#2a2a3e" stroke-width="1.5"/>

    <!-- Notch -->
    <rect x="85" y="6" width="90" height="18" rx="9" fill="#0a0a14"/>

    <!-- Status bar -->
    <text x="20" y="38" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#888">9:41</text>
    <text x="210" y="38" font-family="system-ui, sans-serif" font-size="10" fill="#888">100%</text>

    <!-- Chat header -->
    <rect x="10" y="48" width="240" height="36" rx="0" fill="#1e1e32"/>
    <circle cx="30" cy="66" r="12" fill="#4a9eff"/>
    <text x="30" y="71" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">R</text>
    <text x="48" y="62" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Remote CLI Bot</text>
    <text x="48" y="76" font-family="system-ui, sans-serif" font-size="9" fill="#52c41a">Online</text>

    <!-- ===== Conversation ===== -->

    <!-- User: !sh command -->
    <rect x="88" y="96" width="160" height="26" rx="13" fill="#4a9eff"/>
    <text x="168" y="113" text-anchor="middle" font-family="monospace" font-size="11" fill="white">!sh pm2 list</text>

    <!-- Bot: Terminal card (blue header) -->
    <g transform="translate(12, 130)">
      <rect width="200" height="80" rx="10" fill="#1e1e32" stroke="#4a9eff" stroke-opacity="0.25" stroke-width="1"/>
      <rect width="200" height="3" rx="1.5" fill="#4a9eff"/>
      <text x="10" y="18" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#4a9eff">🔵 Terminal · Done</text>
      <text x="10" y="36" font-family="monospace" font-size="8.5" fill="#666">id  name        status</text>
      <text x="10" y="50" font-family="monospace" font-size="8.5" fill="#52c41a">0   remote-cli  online</text>
      <text x="10" y="64" font-family="monospace" font-size="8.5" fill="#52c41a">1   api-server  online</text>
      <text x="10" y="76" font-family="system-ui, sans-serif" font-size="7.5" fill="#555">执行耗时: 0.2s</text>
    </g>

    <!-- User: AI question -->
    <rect x="50" y="222" width="198" height="26" rx="13" fill="#f5a623"/>
    <text x="149" y="239" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white">帮我看下这个报错原因</text>

    <!-- Bot: Claude card (orange header) -->
    <g transform="translate(12, 258)">
      <rect width="220" height="90" rx="10" fill="#1e1e32" stroke="#f5a623" stroke-opacity="0.25" stroke-width="1"/>
      <rect width="220" height="3" rx="1.5" fill="#f5a623"/>
      <text x="10" y="18" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#f5a623">🟠 Claude · Working...</text>
      <text x="10" y="35" font-family="system-ui, sans-serif" font-size="9" fill="#ccc">我来分析这个错误...</text>
      <!-- Tool call -->
      <rect x="10" y="44" width="170" height="16" rx="3" fill="#0e0e1a"/>
      <text x="16" y="55" font-family="monospace" font-size="8" fill="#4a9eff">Read(src/handlers/ai.ts)</text>
      <text x="10" y="72" font-family="system-ui, sans-serif" font-size="9" fill="#ccc">第 42 行缺少 try-catch...</text>
      <text x="10" y="86" font-family="system-ui, sans-serif" font-size="7.5" fill="#555">claude-sonnet-4-20250514 · ↑2.1k ↓856 · $0.02</text>
    </g>

    <!-- Home indicator -->
    <rect x="90" y="372" width="80" height="4" rx="2" fill="#333"/>
  </g>

  <!-- ========== Floating connection lines ========== -->
  <!-- Dotted lines from phone to labels -->
  <g opacity="0.3">
    <line x1="710" y1="170" x2="660" y2="170" stroke="#4a9eff" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="710" y1="300" x2="660" y2="300" stroke="#f5a623" stroke-width="1" stroke-dasharray="4,4"/>
  </g>

  <!-- Feature callouts (floating next to phone) -->
  <g transform="translate(580, 152)">
    <rect width="72" height="24" rx="12" fill="#4a9eff" fill-opacity="0.15" stroke="#4a9eff" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="36" y="16" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4a9eff">终端卡片</text>
  </g>
  <g transform="translate(575, 286)">
    <rect width="78" height="24" rx="12" fill="#f5a623" fill-opacity="0.15" stroke="#f5a623" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="39" y="16" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f5a623">AI 分析卡片</text>
  </g>

  <!-- Bottom decorative line -->
  <rect y="416" width="1200" height="4" fill="url(#bg)"/>
  <rect y="416" width="400" height="2" rx="1" fill="#4a9eff" opacity="0.3"/>
  <rect x="400" y="416" width="300" height="2" rx="1" fill="#7c3aed" opacity="0.2"/>
  <rect x="700" y="416" width="500" height="2" rx="1" fill="#f5a623" opacity="0.15"/>
</svg>
