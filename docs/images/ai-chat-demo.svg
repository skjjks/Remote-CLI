<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="claude-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5a623"/><stop offset="100%" stop-color="#e8912d"/>
    </linearGradient>
    <linearGradient id="user-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a9eff"/><stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
  </defs>

  <!-- Phone frame -->
  <g filter="url(#shadow)">
    <rect x="140" y="10" width="320" height="380" rx="32" fill="#1a1a2e" stroke="#333" stroke-width="2"/>

    <!-- Status bar -->
    <text x="172" y="38" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#888">9:41</text>
    <text x="408" y="38" font-family="system-ui, sans-serif" font-size="11" fill="#888">100%</text>

    <!-- Chat header -->
    <rect x="156" y="48" width="288" height="40" rx="0" fill="#252540"/>
    <circle cx="180" cy="68" r="14" fill="url(#claude-grad)"/>
    <text x="180" y="73" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white">R</text>
    <text x="202" y="64" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Remote CLI</text>
    <text x="202" y="78" font-family="system-ui, sans-serif" font-size="10" fill="#52c41a">Online</text>

    <!-- User message 1 -->
    <rect x="240" y="100" width="186" height="30" rx="14" fill="url(#user-grad)"/>
    <text x="333" y="119" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="white">帮我看下这个报错原因</text>

    <!-- Claude card -->
    <g transform="translate(164, 142)">
      <rect width="260" height="140" rx="12" fill="#252540" stroke="#f5a623" stroke-opacity="0.3" stroke-width="1"/>
      <!-- Card header -->
      <rect width="260" height="4" rx="2" fill="#f5a623"/>
      <text x="12" y="24" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#f5a623">Claude · Working...</text>

      <!-- Content -->
      <text x="12" y="46" font-family="system-ui, sans-serif" font-size="11" fill="#e0e0e0">我来分析这个错误...</text>

      <!-- Tool call block -->
      <rect x="12" y="56" width="236" height="22" rx="4" fill="#1a1a2e"/>
      <text x="20" y="71" font-family="monospace" font-size="10" fill="#4a9eff">Read(src/handlers/ai.ts)</text>

      <text x="12" y="96" font-family="system-ui, sans-serif" font-size="11" fill="#e0e0e0">找到问题：第 42 行的 async 函数</text>
      <text x="12" y="112" font-family="system-ui, sans-serif" font-size="11" fill="#e0e0e0">缺少 try-catch 包裹，导致未捕</text>
      <text x="12" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#e0e0e0">获的 Promise rejection...</text>

      <!-- Footer -->
      <text x="12" y="138" font-family="system-ui, sans-serif" font-size="9" fill="#666">claude-sonnet-4-20250514 · ↑2.1k ↓856 · $0.02</text>
    </g>

    <!-- User message 2 -->
    <rect x="286" y="296" width="140" height="30" rx="14" fill="url(#user-grad)"/>
    <text x="356" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="white">帮我修复一下</text>

    <!-- Claude typing indicator -->
    <g transform="translate(164, 338)">
      <rect width="80" height="28" rx="14" fill="#252540"/>
      <circle cx="24" cy="14" r="3" fill="#f5a623" opacity="0.4">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="38" cy="14" r="3" fill="#f5a623" opacity="0.4">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="52" cy="14" r="3" fill="#f5a623" opacity="0.4">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Home indicator -->
    <rect x="256" y="378" width="88" height="4" rx="2" fill="#444"/>
  </g>

  <!-- Floating labels -->
  <g transform="translate(480, 120)">
    <line x1="-10" y1="30" x2="0" y2="30" stroke="#f5a623" stroke-opacity="0.5" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="6" y="26" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#f5a623">Claude 卡片</text>
    <text x="6" y="40" font-family="system-ui, sans-serif" font-size="10" fill="#888">实时流式更新</text>
  </g>

  <g transform="translate(480, 200)">
    <text x="6" y="14" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4a9eff">工具调用</text>
    <text x="6" y="28" font-family="system-ui, sans-serif" font-size="10" fill="#888">权限弹窗确认</text>
  </g>

  <g transform="translate(480, 270)">
    <text x="6" y="14" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#52c41a">Token 统计</text>
    <text x="6" y="28" font-family="system-ui, sans-serif" font-size="10" fill="#888">模型 · 用量 · 费用</text>
  </g>

  <!-- Left side labels -->
  <g transform="translate(10, 105)">
    <text x="110" y="14" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4a9eff">用户消息</text>
    <text x="110" y="28" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#888">自然语言输入</text>
  </g>
</svg>
